<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/secret-mission/manifest.webmanifest" />
    <link rel="icon" href="/secret-mission/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/secret-mission/icon.svg" />
    <title>今日の星任務サーバー | Last War Assistant</title>
    <script>
      (() => {
        try {
          const preference = localStorage.getItem("lastwar-theme") || "system";
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const resolved = preference === "system" ? (prefersDark ? "dark" : "light") : preference;
          document.documentElement.classList.toggle("dark", resolved === "dark");
          document.documentElement.classList.toggle("light", resolved === "light");
          document.documentElement.dataset.themePreference = preference;
        } catch (_error) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
    <script type="module" crossorigin src="/secret-mission/assets/index-CjinrQrs.js"></script>
    <link rel="stylesheet" crossorigin href="/secret-mission/assets/index-CtDZXr7T.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
