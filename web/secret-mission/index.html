<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>極秘任務サーバー判定 | Last War Assistant</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <a class="back-link" href="../index.html">← 作戦管理</a>
          <p class="eyebrow">Secret Mission</p>
          <h1>極秘任務サーバー判定</h1>
        </div>
        <div class="summary-strip" aria-label="登録サーバー数">
          <span><b>A</b> 38</span>
          <span><b>B</b> 45</span>
          <span><b>C</b> 38</span>
        </div>
      </header>

      <section class="today-section" aria-labelledby="today-title">
        <article class="today-card" id="today-card">
          <div class="today-head">
            <div>
              <p class="eyebrow">Today</p>
              <h2 id="today-title">今日の星任務</h2>
            </div>
            <span class="today-badge" id="today-group-badge">-</span>
          </div>
          <div class="today-meta">
            <span id="today-date">-</span>
            <span>JST 11:00 更新</span>
          </div>
          <div
            class="segment-control"
            id="today-group-control"
            aria-label="今日のグループ"
          >
            <button type="button" data-group="A">A</button>
            <button type="button" data-group="B">B</button>
            <button type="button" data-group="C">C</button>
          </div>
          <div class="server-chip-list" id="today-server-list"></div>
        </article>
      </section>

      <section class="lookup-grid" aria-label="サーバー判定">
        <form class="lookup-panel" id="lookup-form">
          <label for="server-input">サーバー番号</label>
          <div class="input-row">
            <input
              type="text"
              id="server-input"
              name="server"
              inputmode="numeric"
              autocomplete="off"
              placeholder="例: 156"
              aria-describedby="lookup-result"
            />
            <button type="submit">判定</button>
          </div>
          <output class="result" id="lookup-result" for="server-input">
            <span class="result-label">未入力</span>
            <strong>番号を入力</strong>
          </output>
        </form>

        <aside class="source-panel">
          <img
            src="../assets/secret-mission-server-map.jpg"
            alt="極秘任務サーバーの A、B、C 対応表"
          />
          <p class="source-note">表の重複は補正済み: A 85→88 / A 102→98 / A 148→156</p>
        </aside>
      </section>

      <section class="filter-section" aria-labelledby="all-server-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">All Servers</p>
            <h2 id="all-server-title">全サーバーリスト</h2>
          </div>
          <span class="range-count" id="range-count">-</span>
        </div>

        <div class="range-panel">
          <label class="range-field" for="server-min-range">
            <span>最小</span>
            <input id="server-min-range" type="range" />
            <output id="server-min-output" for="server-min-range">-</output>
          </label>
          <label class="range-field" for="server-max-range">
            <span>最大</span>
            <input id="server-max-range" type="range" />
            <output id="server-max-output" for="server-max-range">-</output>
          </label>
        </div>

        <div class="legend" aria-label="グループ凡例">
          <span class="legend-item group-a">A</span>
          <span class="legend-item group-b">B</span>
          <span class="legend-item group-c">C</span>
        </div>

        <div class="server-chip-list all-server-list" id="all-server-list"></div>
      </section>

      <section class="table-section" aria-labelledby="table-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Server Map</p>
            <h2 id="table-title">A / B / C 対応表</h2>
          </div>
          <button class="clear-button" id="clear-button" type="button">解除</button>
        </div>
        <div class="server-groups" id="server-groups"></div>
      </section>
    </main>
  </body>
</html>
