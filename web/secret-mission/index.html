<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>今日の星任務サーバー | Last War Assistant</title>
    <script>
      (() => {
        const media = window.matchMedia("(prefers-color-scheme: dark)");
        let preference = "system";

        try {
          preference = localStorage.getItem("lastwar-theme") || "system";
        } catch (_error) {
          preference = "system";
        }

        const resolved = preference === "system" ? (media.matches ? "dark" : "light") : preference;
        document.documentElement.classList.toggle("dark", resolved === "dark");
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themePreference = preference;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="today-card" id="today-card" aria-labelledby="today-title">
        <div class="today-head">
          <div>
            <p class="eyebrow">Last War</p>
            <h1 id="today-title">今日の星任務サーバー</h1>
          </div>
          <div class="header-actions">
            <div class="header-controls">
              <div class="theme-toggle" role="group" aria-label="表示テーマ">
                <button type="button" data-theme-option="system">◐</button>
                <button type="button" data-theme-option="light">☀</button>
                <button type="button" data-theme-option="dark">☾</button>
              </div>
              <div class="time-toggle" role="group" aria-label="時間表示">
                <button type="button" data-time-display="local">現地</button>
                <button type="button" data-time-display="server">サーバー</button>
              </div>
              <select class="language-select" id="language-select" aria-label="言語"></select>
            </div>
            <span class="today-badge" id="today-group-badge">-</span>
          </div>
        </div>
        <div class="today-meta">
          <span id="today-date">-</span>
        </div>
        <div class="server-chip-list today-server-list" id="today-server-list" role="button" tabindex="0"></div>
        <div class="copy-status" id="copy-status" role="status" aria-live="polite" hidden></div>
      </section>

      <section class="calendar-section" aria-labelledby="mission-calendar-title">
        <div class="section-head">
          <h2 id="mission-calendar-title">任務カレンダー</h2>
          <span id="mission-reset-note">日本時間11:00更新</span>
        </div>
        <div class="mission-calendar" id="mission-calendar"></div>
      </section>

      <details class="filter-section" aria-label="除外サーバー設定">
        <summary class="filter-toggle">
          <span id="exclusion-settings-title">除外設定</span>
          <span class="filter-toggle-icon" aria-hidden="true"></span>
        </summary>
        <div class="filter-body">
          <div class="legend" aria-label="グループ凡例">
            <span class="legend-item group-a">A</span>
            <span class="legend-item group-b">B</span>
            <span class="legend-item group-c">C</span>
            <button type="button" class="legend-item reset-exclusions" id="reset-exclusions-button">default</button>
          </div>

          <div class="server-chip-list all-server-list" id="all-server-list"></div>
        </div>
      </details>
    </main>
  </body>
</html>
