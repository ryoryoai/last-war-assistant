<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>今日の星任務サーバー | Last War Assistant</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="today-card" id="today-card" aria-labelledby="today-title">
        <div class="today-head">
          <div>
            <p class="eyebrow">Last War</p>
            <h1 id="today-title">今日の星任務サーバー</h1>
          </div>
          <span class="today-badge" id="today-group-badge">-</span>
        </div>
        <div class="today-meta">
          <span id="today-date">-</span>
          <span id="today-cycle">-</span>
          <span id="today-count">-</span>
        </div>
        <div class="server-chip-list today-server-list" id="today-server-list"></div>
      </section>

      <section class="filter-section" aria-labelledby="all-server-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Filter</p>
            <h2 id="all-server-title">全サーバー確認</h2>
          </div>
          <span class="range-count" id="range-count">-</span>
        </div>

        <div class="range-panel">
          <label class="range-field" for="server-min-range">
            <span>最小</span>
            <input id="server-min-range" type="range" />
            <output id="server-min-output" for="server-min-range">-</output>
          </label>
          <label class="range-field" for="server-max-range">
            <span>最大</span>
            <input id="server-max-range" type="range" />
            <output id="server-max-output" for="server-max-range">-</output>
          </label>
        </div>

        <div class="legend" aria-label="グループ凡例">
          <span class="legend-item group-a">A</span>
          <span class="legend-item group-b">B</span>
          <span class="legend-item group-c">C</span>
        </div>

        <div class="server-chip-list all-server-list" id="all-server-list"></div>
      </section>
    </main>
  </body>
</html>
